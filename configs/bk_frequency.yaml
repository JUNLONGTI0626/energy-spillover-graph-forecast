project:
  name: energy_spillover_graph_forecast
  stage: strict_bk_frequency
  description: >
    Strict Barunik-Krehlik frequency connectedness configuration
    for the six-variable daily energy system:
    Electricity, Gas, WTI, Coal, Solar, and Wind.

data:
  input_file: data/processed/daily_returns.csv
  date_column: date
  variable_order:
    - Electricity
    - Gas
    - WTI
    - Coal
    - Solar
    - Wind
  frequency: daily
  enforce_variable_order: true
  drop_na: true
  check_duplicates: true

sample:
  start_date: null
  end_date: null
  use_subsample: false

model:
  engine: R
  package: ConnectednessApproach
  estimation_model: TVP-VAR
  connectedness_type: Frequency
  lag_order: 1
  nfore: 100
  window_size: null
  corrected_tci: false

tvpvar:
  kappa1: 0.99
  kappa2: 0.99
  prior: BayesPrior
  gamma: 0.01

frequency:
  generalized: true
  scenario: ABS
  orth: false

  band_definition: baseline_3band_strict_bk

  # 说明：
  # partition 必须从高频到低频递减，最后以 0 结束
  # 对应 period band 的近似映射为：
  # [pi+eps, pi/5]   -> short-horizon, about 1–5 days
  # [pi/5, pi/20]   -> medium-horizon, about 6–20 days
  # [pi/20, 0]      -> longer-horizon, about 21+ days
  partition:
    - "pi + 0.00001"
    - "pi / 5"
    - "pi / 20"
    - "0"

  period_band_labels:
    - short_horizon_1_5
    - medium_horizon_6_20
    - longer_horizon_21_plus

outputs:
  output_dir: data/features
  save_overall_frequency_table: true
  save_band_tables: true
  save_pairwise_frequency: true
  save_metadata: true

output_files:
  frequency_connectedness: data/features/frequency_connectedness_strict_bk.csv
  frequency_tables_dir: data/features/frequency_matrices_strict_bk
  metadata: data/features/strict_bk_metadata.json
  run_log: outputs/logs/strict_bk_run_report.md

reproducibility:
  overwrite_existing: false
  save_config_copy: true
  save_session_info: true
